services:

  # ─── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: borro_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: borro
      POSTGRES_USER: borro_user
      POSTGRES_PASSWORD: borro_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U borro_user -d borro"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ─── MinIO (S3-compatible object storage) ────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: borro_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web Console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Create the default bucket after MinIO starts
  minio_init:
    image: minio/mc:latest
    container_name: borro_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set borro http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing borro/borro-assets &&
        mc anonymous set download borro/borro-assets &&
        echo 'MinIO bucket borro-assets ready.'
      "

  # ─── ASP.NET Core Backend ────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: borro_backend
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=borro;Username=borro_user;Password=borro_pass"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  # ─── React Frontend (Vite dev server) ────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: borro_frontend
    restart: unless-stopped
    environment:
      # This is read by Vite at startup inside the container
      VITE_API_URL: http://localhost:8080
    ports:
      - "5173:5173"
    volumes:
      # Mount source for hot-reload (optional, remove for pure Docker builds)
      - ./frontend/src:/app/src
    depends_on:
      - backend

volumes:
  postgres_data:
  minio_data:
